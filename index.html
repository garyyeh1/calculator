<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel = "stylesheet" href="style.css">
    <script src = "index.js" defer></script>
</head>
<body>
    <div id = border>
        <div id = calculator>
            <div id = screen-last></div>
            <div id = screen-current> </div>
        </div>
        <div id = buttons>
                <div id = bigbutton1>
                    <button id = clear>CLEAR</button>
                    <div id = firsthalf>
                        <div class = row1>
                            <div id = seven><button>7</button></div>
                            <div id = four><button>4</button></div>
                            <div id = one ><button>1</button></div>
                            <div id = dot><button>.</button></div>
                        </div>
                        <div class = row2>
                            <div id = eight><button>8</div>
                            <div id = five><button>5</div>
                            <div id = two><button>2</div>
                            <div id = zero><button>0</div>
                        </div>
                    </div>
                </div>
                <div id = bigbutton2>
                    <button id = deleted>DELETE</button>
                    <div id = secondhalf>
                        <div class = row3>
                            <div id = nine><button>9</button></div>
                            <div id = six><button>6</button></div>
                            <div id = three><button>3</button></div>
                            <div id = equals><button>=</button></div>
                        </div>
                        <div class = row4>
                            <div id = divide><button>/</button></div>
                            <div id = multiply><button>*</button></div>
                            <div id = subtract><button>-</button></div>
                            <div id = add><button>+</button></div>
                        </div>
                    </div>
                </div>
        </div>
    </div>
    
</body>
</html>
